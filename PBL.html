<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Intelligence System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Rajdhani', sans-serif;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        background: #060b18;
    }

    #bg-image {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 0;
    }
    .scanline-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(0, 255, 136, 0.008) 2px,
            rgba(0, 255, 136, 0.008) 4px
        );
    }

    .vignette {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        background: radial-gradient(
            ellipse at center,
            transparent 50%,
            rgba(6, 11, 24, 0.6) 100%
        );
    }

    .container {
        position: relative;
        z-index: 10;
        background: rgba(10, 18, 36, 0.85);
        padding: 35px 30px;
        border-radius: 4px;
        width: 400px;
        text-align: center;
        border: 1px solid rgba(0, 255, 136, 0.2);
        box-shadow:
            0 0 30px rgba(0, 255, 136, 0.05),
            0 0 60px rgba(0, 180, 100, 0.03),
            inset 0 0 30px rgba(0, 255, 136, 0.02);
        backdrop-filter: blur(10px);
        animation: containerGlow 4s ease-in-out infinite alternate;
    }

    @keyframes containerGlow {
        0% { box-shadow: 0 0 30px rgba(0, 255, 136, 0.05), 0 0 60px rgba(0, 180, 100, 0.03), inset 0 0 30px rgba(0, 255, 136, 0.02); }
        100% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.1), 0 0 80px rgba(0, 180, 100, 0.05), inset 0 0 40px rgba(0, 255, 136, 0.03); }
    }

    .container::before,
    .container::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        border-color: #00ff88;
        border-style: solid;
    }

    .container::before {
        top: -1px;
        left: -1px;
        border-width: 2px 0 0 2px;
    }

    .container::after {
        bottom: -1px;
        right: -1px;
        border-width: 0 2px 2px 0;
    }

    .system-label {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.65rem;
        color: #00ff88;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 5px;
        opacity: 0.7;
    }

    h2 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 3px;
        margin-bottom: 6px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
    }

    .subtitle {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.7rem;
        color: rgba(0, 255, 136, 0.5);
        letter-spacing: 2px;
        margin-bottom: 25px;
    }

    .input-wrapper {
        position: relative;
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 14px 16px;
        padding-left: 42px;
        border-radius: 3px;
        border: 1px solid rgba(0, 255, 136, 0.25);
        background: rgba(6, 11, 24, 0.9);
        color: #00ff88;
        font-family: 'Share Tech Mono', monospace;
        font-size: 1rem;
        letter-spacing: 2px;
        outline: none;
        transition: all 0.3s ease;
    }

    input::placeholder {
        color: rgba(0, 255, 136, 0.25);
        letter-spacing: 1px;
        font-size: 0.85rem;
    }

    input:focus {
        border-color: #00ff88;
        box-shadow: 0 0 20px rgba(0, 255, 136, 0.15), inset 0 0 15px rgba(0, 255, 136, 0.05);
    }

    .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(0, 255, 136, 0.4);
        font-size: 1rem;
    }

    button {
        width: 100%;
        padding: 13px;
        border-radius: 3px;
        border: 1px solid rgba(0, 255, 136, 0.4);
        background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 180, 100, 0.15));
        color: #00ff88;
        cursor: pointer;
        font-family: 'Orbitron', sans-serif;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
        transition: left 0.5s ease;
    }

    button:hover {
        background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 180, 100, 0.25));
        box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
        transform: translateY(-1px);
    }

    button:hover::before {
        left: 100%;
    }

    button:active {
        transform: translateY(0);
    }

    button:disabled {
        background: rgba(50, 50, 50, 0.3);
        border-color: rgba(100, 100, 100, 0.3);
        color: #555;
        cursor: not-allowed;
        box-shadow: none;
    }

    #output-box {
        margin-top: 20px;
        text-align: left;
        font-family: 'Rajdhani', sans-serif;
    }

    #output-box:empty {
        display: none;
    }

    #output-box h3 {
        font-family: 'Orbitron', sans-serif;
        font-size: 1rem;
        color: #00ff88;
        letter-spacing: 1px;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid rgba(0, 255, 136, 0.15);
    }

    #output-box p {
        font-size: 0.95rem;
        line-height: 1.7;
        color: #b0c4b8;
        margin-bottom: 4px;
    }

    #output-box strong {
        color: #8aefb8;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    #output-box hr {
        border: none;
        border-top: 1px solid rgba(0, 255, 136, 0.12);
        margin: 14px 0;
    }

    .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        padding-top: 12px;
        border-top: 1px solid rgba(0, 255, 136, 0.1);
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.6rem;
        color: rgba(0, 255, 136, 0.35);
        letter-spacing: 1px;
    }

    .status-dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: #00ff88;
        border-radius: 50%;
        margin-right: 5px;
        animation: statusPulse 2s ease-in-out infinite;
    }

    @keyframes statusPulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 4px #00ff88; }
        50% { opacity: 0.4; box-shadow: none; }
    }

    .float-panel {
        position: fixed;
        z-index: 5;
        border: 1px solid rgba(0, 255, 136, 0.12);
        background: rgba(10, 18, 36, 0.6);
        padding: 12px 16px;
        border-radius: 3px;
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.65rem;
        color: rgba(0, 255, 136, 0.4);
        letter-spacing: 1px;
        pointer-events: none;
        backdrop-filter: blur(3px);
    }

    .float-panel .panel-title {
        color: #00ff88;
        font-size: 0.7rem;
        font-weight: bold;
        margin-bottom: 6px;
        letter-spacing: 2px;
    }

    .float-panel .panel-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 2px;
    }

    .float-panel .val-red { color: #ff6b6b; }
    .float-panel .val-yellow { color: #ffa94d; }
    .float-panel .val-green { color: #00ff88; }

    .panel-left-top {
        top: 12%;
        left: 3%;
        animation: floatPanel 6s ease-in-out infinite;
    }

    .panel-right-top {
        top: 10%;
        right: 3%;
        animation: floatPanel 7s ease-in-out infinite 1s;
    }

    .panel-left-bottom {
        bottom: 10%;
        left: 3%;
        animation: floatPanel 8s ease-in-out infinite 0.5s;
    }

    .panel-right-bottom {
        bottom: 8%;
        right: 3%;
        animation: floatPanel 6.5s ease-in-out infinite 1.5s;
    }

    @keyframes floatPanel {
        0%, 100% { transform: translateY(0px); opacity: 0.6; }
        50% { transform: translateY(-8px); opacity: 0.9; }
    }

    @media (max-width: 900px) {
        .float-panel { display: none; }
    }

    @media (max-width: 500px) {
        .container {
            width: 92%;
            padding: 25px 20px;
        }
    }
</style>
</head>

<body>
<img src="bg-image.png" alt="" id="bg-image">
<div class="scanline-overlay"></div>
<div class="vignette"></div>

<div class="float-panel panel-left-top">
    <div class="panel-title">ALLERGENS</div>
    <div class="panel-row"><span>Gluten</span><span class="val-red">YES</span></div>
    <div class="panel-row"><span>Dairy</span><span class="val-yellow">TRACE</span></div>
    <div class="panel-row"><span>Nuts</span><span class="val-green">NO</span></div>
</div>

<div class="float-panel panel-right-top">
    <div class="panel-title">PRESERVATIVES</div>
    <div class="panel-row"><span>E211</span><span class="val-red">HIGH</span></div>
    <div class="panel-row"><span>E330</span><span class="val-yellow">MED</span></div>
    <div class="panel-row"><span>E300</span><span class="val-green">LOW</span></div>
</div>

<div class="float-panel panel-left-bottom">
    <div class="panel-title">NUTRITION</div>
    <div class="panel-row"><span>Sugar</span><span class="val-red">32g</span></div>
    <div class="panel-row"><span>Sodium</span><span class="val-yellow">480mg</span></div>
    <div class="panel-row"><span>Protein</span><span class="val-green">8g</span></div>
</div>

<div class="float-panel panel-right-bottom">
    <div class="panel-title">HEALTH RATING</div>
    <div class="panel-row"><span>Calories</span><span>320</span></div>
    <div class="panel-row"><span>Organic</span><span class="val-green">YES</span></div>
    <div class="panel-row"><span>Score</span><span class="val-green">8.4/10</span></div>
</div>

<div class="container">
    <div class="system-label">Food Intelligence System</div>
    <h2>Barcode Scanner</h2>
    <div class="subtitle">Scan · Analyze · Know What You Eat</div>

    <div class="input-wrapper">
        <span class="input-icon">⊞</span>
        <input 
            type="text" 
            id="question" 
            placeholder="Enter barcode number..."
            autocomplete="off"
        >
    </div>

    <button id="searchBtn">▶ Scan Product</button>

    <div id="output-box"></div>

    <div class="status-bar">
        <span><span class="status-dot"></span>SYSTEM ONLINE</span>
        <span id="clockDisplay">--:--:--</span>
    </div>
</div>

<script>
(function() {
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-US', { hour12: false });
        const el = document.getElementById('clockDisplay');
        if (el) el.textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();
})();
</script>

<script src="pbl.js"></script>
</body>
</html>
