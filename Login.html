<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="loginUser(event)">
    <h2>Verification</h2>

    <input type="text" id="username" placeholder="Enter Username" required><br><br>

    <input type="password" id="password" placeholder="Password" required><br><br>
    <button type="submit">Sign In</button>

</form>
</body>
</html>

<style>
    h2{
    text-align:center;
    color:red;
}
form {
    width: 300px;
    margin: 150px auto;      
    text-align: center;  
}
form input {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    font-size: 16px;
    border-radius:20px;
    color:purple;
}

form button{
    padding:10px;
    border-radius:10px;
    border-color:blue;
    color:red
}

form button:hover{
    transform: translateZ(-10px);
    box-shadow: 0 10px 30px rgba(20, 70, 70, 0.5);
}

form {
    width: 320px;
    padding: 25px;
    margin: 0 auto;
    text-align: center;
    animation: borderGlow 1.5s infinite alternate;

    border-radius: 20px;
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    margin-top:140px;
    border-color:gold;
    border-width:5px
}
@keyframes borderGlow {
    0% {
    box-shadow: 0 0 5px gold;
    }
    100% {
    box-shadow: 0 0 20px gold;
    }
}
</style>

<script>
    function loginUser(event){
        event.preventDefault();
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;

        if(username == "parthkale416@gmail.com" && password == "Parth@2008"){
            alert("login successful");

            //window.location.href = "PBL.html";
            //<button class="buy-btn" type="button" onclick="window.location.href='PBL.html'">Sign In</button>
            window.location.href = "PBL.html";
